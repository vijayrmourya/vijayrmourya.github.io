# Badge Certifications Configuration
# This file manages certification badges displayed on the certifications page
#
# Instructions:
#   1. Add your certification details below
#   2. Place badge images in assets/badges/ folder
#   3. Run: python3 tools/generate_badge_certifications.py
#   4. The script will generate assets/badge_certifications.json
#
# Badge Image Sources:
#   - Credly: Download badge from your Credly account
#   - Coursera: Screenshot or download from certificate page
#   - Google Cloud: Download from Skills Boost profile
#   - LinkedIn: Screenshot from your certification section

